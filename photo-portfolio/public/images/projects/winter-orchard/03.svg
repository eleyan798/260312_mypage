<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1600" y2="1120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c4c1ba"/>
      <stop offset="1" stop-color="#9f9b93"/>
    </linearGradient>
    <filter id="n">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1600" height="1120" fill="url(#g)"/>
  <rect width="1600" height="1120" fill="#000" filter="url(#n)"/>
  <line x1="0" y1="780" x2="1600" y2="760" stroke="#ffffff" stroke-opacity="0.22"/>
  <text x="80" y="1040" fill="#ffffff" fill-opacity="0.58" font-size="42" letter-spacing="4">WINTER ORCHARD 03</text>
